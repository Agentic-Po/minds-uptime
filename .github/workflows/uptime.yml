name: uptime
on:
  schedule:
    - cron: '7 * * * *'   # hourly at :07 (offset avoids top-of-hour cron congestion)
  workflow_dispatch: {}

concurrency:
  group: uptime
  cancel-in-progress: false

permissions:
  contents: write   # commit state.json back

jobs:
  ping:
    runs-on: ubuntu-latest
    # The job self-loops on a 12-minute grid for ~50 min (GitHub throttles
    # high-frequency schedule triggers, so we probe inside one job instead of
    # asking for more triggers). 60 = the 50-min budget plus a full final round.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # PINNED. An unpinned install let minds-cli 0.1.3 (published
      # 2026-07-21T09:16Z) onto fresh runners mid-flight; it renamed the history
      # field partyType -> senderType, which silently blinded the probe and
      # produced ~19h of false "outage" pages while the agent was answering
      # every single time. Bump this deliberately, never implicitly.
      - name: Install CLI
        run: |
          npm i -g @animocabrands/minds-cli@0.1.3
          minds --version
      - name: Probe + alert
        env:
          MINDS_BUILDER_API_KEY: ${{ secrets.MINDS_BUILDER_API_KEY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROBE_MIND: ${{ secrets.PROBE_MIND }}
          CONTROL_MIND: ${{ secrets.CONTROL_MIND }}
        run: node monitor.mjs
      - name: Persist state
        run: |
          git config user.name "uptime-bot"
          git config user.email "actions@github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "state: $(date -u +%FT%TZ)"
          git push
